<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>

    <!-- Tailwind + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        body {
            font-family: "Geist", sans-serif;
            background: #f8fafc;
        }
    </style>

</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar bg-white shadow-sm px-8 mx-auto flex items-center justify-between">

        <div class="flex items-center gap-2">
            <img class="w-9 h-[37px]" src="./assets/github-logo.png" alt="">
            <h1 class="text-xl font-semibold">GitHub Issues Tracker</h1>
        </div>

        <div class="flex gap-3">

            <input type="text" placeholder="Search issues..." class="input input-bordered w-64" />

            <button class="btn bg-[#4a00ff] text-white border-0">
                + New Issue
            </button>

        </div>

    </div>


    <!-- PAGE CONTENT -->
    <div class="max-w-7xl mx-auto p-8">

        <!-- FILTER TABS -->
        <div class="bg-white rounded-lg p-4 mb-6 flex gap-2 shadow-sm">

            <button class="btn btn-primary w-[120px] h-10 bg-[#4a00ff]">All</button>
            <button class="btn w-[120px] h-10 text-[#64748b]">Open</button>
            <button class="btn w-[120px] h-10 text-[#64748b]">Closed</button>

        </div>


        <!-- ISSUE HEADER -->
        <div class="bg-white rounded-lg p-6 mb-6 shadow-sm flex justify-between items-center">

            <div class="flex items-center gap-4">
                <!-- Icon -->
                <div class="w-[50px] h-[50px] bg-[#ECE4FF] rounded-full flex items-center justify-center shrink-0">
                    <img src="./assets/Aperture.png" alt="Aperture Icon" class="w-6 h-6">
                </div>

                <div>
                    <h2 class="font-semibold text-lg leading-tight">50 Issues</h2>
                    <p class="text-sm text-gray-500">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex gap-4 text-sm font-medium">
                <div class="flex items-center gap-1">
                    <span class="text-[#00a96e] text-2xl">●</span> Open
                </div>
                <div class="flex items-center gap-1">
                    <span class="text-[#a855f7] text-2xl">●</span> Closed
                </div>
            </div>

        </div>



        <!-- ISSUE GRID -->
        <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

            <!-- SINGLE CARD TEMPLATE -->
            <div class="card bg-white shadow-sm border border-gray-200">

                <div class="card-body p-5">

                    <!-- top row -->
                    <div class="flex justify-between items-center mb-2">

                        <img src="./assets/Open-Status.png" alt="">

                        <span class="text-xs bg-red-100 text-red-600 px-6 py-1 rounded-[100px]">
                            HIGH
                        </span>

                    </div>

                    <!-- title -->
                    <h3 class="font-semibold text-sm leading-tight">
                        Fix Navigation Menu On Mobile Devices
                    </h3>

                    <!-- description -->
                    <p class="text-xs text-gray-500 mt-2">
                        The navigation menu doesn't collapse properly on mobile devices.
                    </p>

                    <!-- tags -->
                    <div class="flex gap-3 mt-3 flex-wrap">

                        <!-- Bug Tag -->
                        <span
                            class="flex items-center gap-1.5 px-3 py-1 rounded-full bg-red-100 text-red-600 text-xs font-bold">
                            <img src="./assets/BugDroid.png" alt="" class="w-4 h-4">
                            BUG
                        </span>

                        <!-- Help Wanted Tag -->
                        <span
                            class="flex items-center gap-1.5 px-3 py-1 rounded-full bg-orange-100 text-orange-600 text-xs font-bold">
                            <i class="fa-solid fa-life-ring"></i>
                            HELP WANTED
                        </span>

                    </div>


                    <!-- footer -->
                    <div class=" text-gray-400 mt-4">
                        <span>#1
                            by john_doe</span><br>
                        1/15/2024
                    </div>

                </div>
            </div>
            <!-- END CARD -->

        </div>

    </div>

</body>

</html>
