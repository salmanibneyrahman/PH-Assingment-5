<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }

        body {
            background: #f8fafc;
        }

        .issue-card {
            transition: all 0.2s ease;
        }

        .issue-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        .top-border-open {
            border-top: 4px solid #00a96e;
        }

        .top-border-closed {
            border-top: 4px solid #a855f7;
        }

        .spinner {
            border: 4px solid #e5e7eb;
            border-top: 4px solid #4a00ff;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div
        class="navbar bg-white shadow-sm px-4 md:px-8 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
        <div class="flex items-center gap-2">
            <img class="w-9 h-[37px]" src="./assets/github-logo.png" alt="">
            <h1 class="text-xl font-semibold">GitHub Issues Tracker</h1>
        </div>

        <div class="flex w-full md:w-auto gap-3">
            <input id="search-input" type="text" placeholder="Search issues..."
                onkeyup="if(event.key==='Enter') searchIssues()"
                class="input input-bordered flex-1 md:w-64 focus:border-[#4a00ff]">
            <button onclick="newIssue()" class="btn bg-[#4a00ff] text-white border-0 whitespace-nowrap">
                + New Issue
            </button>
        </div>
    </div>

    <!-- PAGE CONTENT -->
    <div class="max-w-7xl mx-auto p-4 md:p-8">

        <!-- FILTER TABS -->
        <div class="bg-white rounded-lg p-4 mb-6 flex flex-wrap gap-2 shadow-sm">
            <button onclick="filterIssues('all')" id="btn-all"
                class="btn btn-primary w-full sm:w-[120px] h-10 bg-[#4a00ff] text-white">All</button>
            <button onclick="filterIssues('open')" id="btn-open"
                class="btn w-full sm:w-[120px] h-10 text-[#64748b]">Open</button>
            <button onclick="filterIssues('closed')" id="btn-closed"
                class="btn w-full sm:w-[120px] h-10 text-[#64748b]">Closed</button>
        </div>

        <!-- ISSUE HEADER -->
        <div
            class="bg-white rounded-lg p-6 mb-6 shadow-sm flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div class="flex items-center gap-4">
                <div class="w-[50px] h-[50px] bg-[#ECE4FF] rounded-full flex items-center justify-center shrink-0">
                    <img src="./assets/Aperture.png" alt="Aperture Icon" class="w-6 h-6">
                </div>
                <div>
                    <h2 id="total-issues" class="font-semibold text-lg leading-tight">0 Issues</h2>
                    <p class="text-sm text-gray-500">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-4 text-sm font-medium">
                <div class="flex items-center gap-1"><span class="text-[#00a96e] text-2xl">●</span> Open</div>
                <div class="flex items-center gap-1"><span class="text-[#a855f7] text-2xl">●</span> Closed</div>
            </div>
        </div>

        <!-- LOADING -->
        <div id="loading" class="hidden flex justify-center py-20">
            <div class="spinner w-12 h-12 rounded-full"></div>
        </div>

        <!-- ISSUE GRID -->
        <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- MODAL -->
    <div id="issue-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-2xl mx-auto rounded-3xl shadow-2xl overflow-hidden border border-gray-100">

            <!-- Header -->
            <div class="p-5 sm:p-6 md:p-8">
                <h2 id="modal-title" class="text-2xl font-bold text-gray-900 mb-4"></h2>

                <!-- Status + Opened by -->
                <div class="flex items-center gap-3 text-sm flex-wrap">
                    <span id="modal-status-pill" class="px-5 py-1 text-xs font-semibold rounded-full"></span>
                    <span id="modal-opened-by" class="text-gray-500"></span>
                </div>

                <!-- Labels -->
                <div id="modal-labels" class="flex gap-3 mt-5 flex-wrap"></div>

                <!-- Description -->
                <p id="modal-description" class="mt-7 text-gray-700 leading-relaxed text-[15px]"></p>

                <!-- Assignee & Priority Box -->
                <div class="mt-8 bg-[#f8fafc] rounded-2xl p-5 grid grid-cols-2 gap-8">
                    <div>
                        <span class="text-xs text-gray-500 block mb-1">Assignee:</span>
                        <span id="modal-assignee" class="font-medium text-gray-900"></span>
                    </div>
                    <div>
                        <span class="text-xs text-gray-500 block mb-1">Priority:</span>
                        <span id="modal-priority" class="inline-block"></span>
                    </div>
                </div>
            </div>

            <!-- Footer with Purple Close Button -->
            <div class="px-5 sm:px-6 md:px-8 py-6 border-t flex justify-end bg-white">
                <button onclick="closeModal()"
                    class="btn bg-[#4a00ff] hover:bg-[#3a00cc] text-white px-12 py-3 text-sm font-medium rounded-xl w-full sm:w-auto">
                    Close
                </button>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>

</html>
