<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>

    <!-- Tailwind + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Geist", sans-serif;
            background: #f8fafc;
        }
    </style>

</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar bg-white shadow-sm px-8 mx-auto flex items-center justify-between">

        <div class="flex items-center gap-2">
            <img class="w-9 h-[37px]" src="./assets/github-logo.png" alt="">
            <h1 class="text-xl font-semibold">GitHub Issues Tracker</h1>
        </div>

        <div class="flex gap-3">

            <input type="text" placeholder="Search issues..." class="input input-bordered w-64" />

            <button class="btn bg-[#4a00ff] text-white border-0">
                + New Issue
            </button>

        </div>

    </div>


    <!-- PAGE CONTENT -->
    <div class="max-w-7xl mx-auto p-8">

        <!-- FILTER TABS -->
        <div class="bg-white rounded-lg p-4 mb-6 flex gap-2 shadow-sm">

            <button class="btn btn-primary w-[120px] h-10 bg-[#4a00ff]">All</button>
            <button class="btn w-[120px] h-10 text-[#64748b]">Open</button>
            <button class="btn w-[120px] h-10 text-[#64748b]">Closed</button>

        </div>


        <!-- ISSUE HEADER -->
        <div class="bg-white rounded-lg p-6 mb-6 shadow-sm flex justify-between items-center">

            <div class="flex items-center gap-4">
                <!-- Icon -->
                <div class="w-[50px] h-[50px] bg-[#ECE4FF] rounded-full flex items-center justify-center shrink-0">
                    <img src="./assets/Aperture.png" alt="Aperture Icon" class="w-6 h-6">
                </div>

                <div>
                    <h2 class="font-semibold text-lg leading-tight">50 Issues</h2>
                    <p class="text-sm text-gray-500">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex gap-4 text-sm font-medium">
                <div class="flex items-center gap-1">
                    <span class="text-[#00a96e] text-2xl">●</span> Open
                </div>
                <div class="flex items-center gap-1">
                    <span class="text-[#a855f7] text-2xl">●</span> Closed
                </div>
            </div>

        </div>




    </div>

</body>

</html>
